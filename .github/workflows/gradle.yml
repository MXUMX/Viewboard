name: Java CI with Gradle

on:
  push:
    branches:
      - neoforge-1.21.11
      - neoforge-1.21.5
      - neoforge-1.21.1-1.21.3
  workflow_dispatch: # This enables the manual trigger
    inputs:
      reason:
        description: 'Reason for manual release'
        required: false
        default: 'Manual trigger'

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      # Checkout repo
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate commit list
        id: commits
        run: |
          COMMITS=$(git log -n 20 --pretty=format:"- %h %s")
          echo "commits<<EOF" >> $GITHUB_OUTPUT
          echo "$COMMITS" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      # Setup Java
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      # Ensure gradlew is executable
      - name: Make Gradle wrapper executable
        run: chmod +x gradlew

      # Setup Gradle caching + config
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Extract version from gradle.properties
        id: get_version
        run: |
          VERSION=$(grep "^mod_version=" gradle.properties | cut -d'=' -f2)
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      # Build project
      - name: Build with Gradle
        run: ./gradlew build --no-daemon

      # Create GitHub Release with artifacts
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: build/libs/*.jar
          tag_name: ${{ github.ref_name }}-${{ github.run_id }}
          name: ViewBoard ${{ steps.get_version.outputs.version }} for ${{ github.ref_name }}
          target_commitish: ${{ github.ref_name }}
          body: |
            ## Changes
            ${{ steps.commits.outputs.commits }}
          draft: false
          prerelease: false

  dependency-submission:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Submit dependency graph
        uses: gradle/actions/dependency-submission@v4
